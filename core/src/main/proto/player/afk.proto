syntax = "proto3";
package player;

option java_outer_classname = "AfkProto";
option java_multiple_files = true;
option java_package = "net.totorix.protocol.player";

service AFKService {
  rpc SetAFK(SetAFKRequest) returns (SetAFKResponse);
  rpc GetAFKStatus(GetAFKStatusRequest) returns (GetAFKStatusResponse);
}

message SetAFKRequest {
  string unique_id = 1;
  bool afk = 2;
}

message SetAFKResponse {
  bool success = 1;
}

message GetAFKStatusRequest {
  string unique_id = 1;
}

message GetAFKStatusResponse {
  bool afk = 1;
  // epoch millis when current AFK started; 0 if player is not AFK
  int64 afk_since = 2;
  // accumulated AFK millis this session, excluding the current ongoing AFK window
  // client must add (current_time - afk_since) when afk_since > 0 for full AFK duration
  int64 stored_afk_duration = 3;
}
